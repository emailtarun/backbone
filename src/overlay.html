<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Break</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; overflow: hidden; user-select: none; }
      body { font-family: -apple-system, system-ui, sans-serif; color: #fff;
        display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
      /* each theme sets its own accent (ring + side pill + label + dots) */
      body.slate  { background: linear-gradient(155deg, #334155, #1e293b); --accent: #FB7185; --ink: #4c0519; }
      body.aurora { background: linear-gradient(150deg, #5b6cff, #00c6ad); --accent: #A5B4FC; --ink: #312e81; }
      body.sunset { background: linear-gradient(150deg, #ff7e5f, #feb47b); --accent: #DB2777; --ink: #fff1f7; }
      body.forest { background: linear-gradient(150deg, #0f9b6e, #1c3b2e); --accent: #A3E635; --ink: #1a2e05; }
      body.mono   { background: linear-gradient(150deg, #2b2b2e, #4a4a4f); --accent: #5AC8FA; --ink: #082338; }
      #clock { position: absolute; top: 26px; right: 32px; font-size: 14px; opacity: .55; font-variant-numeric: tabular-nums; }
      #kind { font-size: 13px; letter-spacing: .16em; text-transform: uppercase; color: var(--accent); font-weight: 600; }
      #name { font-size: 34px; font-weight: 600; margin: 14px 24px 6px; }
      #side { display: none; font-size: 27px; font-weight: 700; color: var(--ink); background: var(--accent);
        padding: 10px 28px; border-radius: 999px; margin: 8px 0 6px; letter-spacing: .01em;
        box-shadow: 0 8px 26px rgba(0,0,0,.28); }
      #side.show { display: inline-block; animation: sidePop .45s cubic-bezier(.2,1.3,.5,1); }
      @keyframes sidePop { 0% { transform: scale(.6); opacity: 0; } 60% { transform: scale(1.12); } 100% { transform: scale(1); opacity: 1; } }
      #cue { font-size: 18px; opacity: .92; max-width: 580px; margin: 10px 30px 22px; line-height: 1.5; min-height: 54px; }
      #ringWrap { position: relative; width: 200px; height: 200px; margin-bottom: 16px; }
      #ringSvg { transform: rotate(-90deg); }
      #ring { stroke: var(--accent); } /* per-theme ring colour (overrides the attribute) */
      #count { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
        font-size: 50px; font-weight: 600; font-variant-numeric: tabular-nums; }
      #steps { font-size: 13px; opacity: .65; margin-bottom: 8px; }
      #dots { display: flex; gap: 7px; justify-content: center; margin-bottom: 24px; }
      #dots i { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,.3); display: block; }
      #dots i.done { background: var(--accent); } #dots i.cur { background: #fff; }
      .controls { display: flex; gap: 12px; align-items: center; margin-bottom: 14px; }
      .ctl { font: inherit; font-size: 15px; font-weight: 600; padding: 12px 22px; border-radius: 999px; border: none;
        background: rgba(255,255,255,.16); color: #fff; cursor: pointer; transition: .12s; }
      .ctl:hover { background: rgba(255,255,255,.26); }
      #pause { background: #fff; color: #1b1b50; min-width: 112px; }
      .endrow { display: flex; gap: 16px; }
      .link { font-size: 13px; opacity: .7; background: none; border: none; color: #fff; cursor: pointer; }
      .link:hover { opacity: 1; }
      .hidden { display: none !important; }
    </style>
  </head>
  <body class="slate">
    <div id="clock"></div>
    <div id="kind">Stretch break</div>
    <div id="name">—</div>
    <div id="side"></div>
    <div id="cue"></div>

    <div id="ringWrap">
      <svg id="ringSvg" width="200" height="200">
        <circle cx="100" cy="100" r="86" stroke="rgba(255,255,255,.22)" stroke-width="10" fill="none" />
        <circle id="ring" cx="100" cy="100" r="86" stroke="#FB7185" stroke-width="10" fill="none" stroke-linecap="round" />
      </svg>
      <div id="count">–</div>
    </div>

    <div id="steps"></div>
    <div id="dots"></div>

    <div class="controls">
      <button class="ctl" id="pause">Pause</button>
      <button class="ctl" id="skip">Skip ▸</button>
    </div>
    <div class="endrow">
      <button class="link" id="postpone">Postpone 5 min</button>
      <button class="link" id="end">End break</button>
    </div>

    <script src="./overlay.js"></script>
  </body>
</html>
