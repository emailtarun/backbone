<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Backbone — Camera</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        font-family: -apple-system, system-ui, sans-serif;
        background: #11131a;
        color: #e7e9ee;
        overflow: hidden;
      }
      #wrap { position: relative; width: 420px; }
      video { display: none; }
      canvas { width: 420px; height: 315px; background: #000; display: block; }
      #hud {
        display: flex; align-items: center; gap: 10px;
        padding: 8px 12px; font-size: 13px;
      }
      #dot { width: 12px; height: 12px; border-radius: 50%; background: #888; }
      .good #dot { background: #34c759; }
      .bad #dot { background: #ffcc00; }
      .none #dot { background: #555; }
      #score { font-variant-numeric: tabular-nums; opacity: .85; }
      #msg { opacity: .7; font-size: 12px; padding: 0 12px 10px; min-height: 16px; }
      #bar { height: 6px; background: #23262f; border-radius: 3px; margin: 0 12px; overflow: hidden; }
      #fill { height: 100%; width: 0; background: #34c759; transition: width .15s, background .15s; }
    </style>
  </head>
  <body class="none">
    <div id="wrap">
      <video id="video" playsinline></video>
      <canvas id="canvas" width="420" height="315"></canvas>
      <div id="hud">
        <div id="dot"></div>
        <div id="state">starting…</div>
        <div id="score"></div>
      </div>
      <div id="bar"><div id="fill"></div></div>
      <div id="msg"></div>
    </div>
    <script type="module" src="./monitor.js"></script>
  </body>
</html>
