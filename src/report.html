<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Report a problem</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body { font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 22px;
        background: #f5f5f7; color: #1d1d1f; display: flex; flex-direction: column; height: 100vh; }
      @media (prefers-color-scheme: dark) { body { background: #1c1c1e; color: #f2f2f7; } textarea { background:#2c2c2e; color:#fff; border-color:#48484a; } }
      h1 { font-size: 18px; margin: 0 0 4px; }
      p { font-size: 13px; opacity: .65; margin: 0 0 12px; line-height: 1.45; }
      textarea { flex: 1; width: 100%; resize: none; font: inherit; font-size: 14px; padding: 10px 12px;
        border-radius: 10px; border: 1px solid #d2d2d7; line-height: 1.4; }
      .row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 14px; }
      button { font: inherit; font-size: 14px; font-weight: 600; padding: 10px 18px; border-radius: 9px;
        border: 1px solid #d2d2d7; background: transparent; color: inherit; cursor: pointer; }
      button.primary { background: #334155; color: #fff; border-color: #334155; }
      .note { font-size: 11px; opacity: .5; margin-top: 10px; }
    </style>
  </head>
  <body>
    <h1>Report a problem</h1>
    <p>What went wrong? (What were you doing, what did you expect?)</p>
    <textarea id="note" placeholder="e.g. The camera view stayed black after I opened the app…" autofocus></textarea>
    <div class="row">
      <button id="cancel">Cancel</button>
      <button id="send" class="primary">Send report</button>
    </div>
    <div class="note">Sends your note plus app version &amp; OS — no video, no personal data.</div>
    <script src="./report.js"></script>
  </body>
</html>
