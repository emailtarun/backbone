<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Posture Flash</title>
    <style>
      html, body { margin: 0; height: 100%; width: 100%; overflow: hidden;
        background: transparent; pointer-events: none; font-family: -apple-system, system-ui, sans-serif; }
      #border {
        position: fixed; inset: 0; border: 9px solid rgba(255,200,40,.8); border-radius: 16px;
        box-shadow: inset 0 0 75px rgba(255,190,30,.42); opacity: 0; transition: opacity .4s;
      }
      /* persistent amber glow — stays on until posture is corrected */
      #border.on { opacity: 1; animation: glowPulse 2.6s ease-in-out infinite; }
      @keyframes glowPulse { 0%,100% { opacity: .72; } 50% { opacity: 1; } }
      /* escalated: faster, more insistent flash after prolonged slouching */
      #border.on.urgent { animation: glowFlash .8s ease-in-out infinite; }
      @keyframes glowFlash { 0%,100% { opacity: 1; } 50% { opacity: .2; } }
      #hud {
        position: fixed; top: 34px; left: 50%; transform: translateX(-50%) translateY(-20px);
        background: rgba(20,20,24,.82); color: #fff; padding: 12px 20px; border-radius: 999px;
        font-size: 15px; font-weight: 600; backdrop-filter: blur(10px); opacity: 0;
        transition: opacity .3s, transform .3s; box-shadow: 0 8px 30px rgba(0,0,0,.35);
      }
      #hud.on { opacity: 1; transform: translateX(-50%) translateY(0); }
      #hud .dot { color: #ffb020; }
      #cue {
        position: fixed; bottom: 46px; left: 50%; transform: translateX(-50%) translateY(14px);
        background: rgba(20,20,24,.86); color: #fff; padding: 14px 22px; border-radius: 16px;
        font-family: -apple-system, system-ui, sans-serif; font-size: 17px; font-weight: 600;
        backdrop-filter: blur(12px); opacity: 0; transition: opacity .3s, transform .3s;
        box-shadow: 0 10px 34px rgba(0,0,0,.4); display: flex; align-items: center; gap: 11px;
      }
      #cue.on { opacity: 1; transform: translateX(-50%) translateY(0); }
      #cue .ic { width: 9px; height: 9px; border-radius: 50%; background: #FB7185; flex: none; }
    </style>
  </head>
  <body>
    <div id="border"></div>
    <div id="hud"><span class="dot">●</span> &nbsp;Lean back from your screen</div>
    <div id="cue"><span class="ic"></span><span id="cueText"></span></div>
    <script src="./flash.js"></script>
  </body>
</html>
