name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      # Build platforms sequentially so the first job creates the GitHub Release
      # and the second uploads into it (parallel publishes race on release create).
      max-parallel: 1
      matrix:
        include:
          - os: macos-latest
            platform: --mac
          - os: windows-latest
            platform: --win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      # On a version tag, CI publishes ONLY the Windows build. The macOS build is
      # signed + notarized + published locally via `npm run ship`, so CI must not
      # publish an unsigned mac build that would clobber it (and break auto-update).
      - name: Build
        run: npx electron-builder ${{ matrix.platform }} --publish ${{ (startsWith(github.ref, 'refs/tags/v') && matrix.platform == '--win') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Versionless "always-latest" alias + keep the originally-shared v0.1.14
      # link serving the newest build (people already have that link).
      - name: Windows latest + v0.1.14 aliases
        if: matrix.platform == '--win' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          f=$(ls dist/*Setup*.exe | head -1)
          cp "$f" dist/Backbone-windows.exe
          gh release upload "${GITHUB_REF_NAME}" dist/Backbone-windows.exe --clobber
          cp "$f" dist/Backbone-Setup-0.1.14.exe
          gh release upload v0.1.14 dist/Backbone-Setup-0.1.14.exe --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: Backbone-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
          if-no-files-found: ignore
